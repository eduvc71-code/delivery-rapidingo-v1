    <script>
      (function () {
        var role = 'client';
        var path = window.location.pathname.toLowerCase();
        if (!role && (path.endsWith('./') || path.endsWith('./index.html'))) {
          var rootPath = window.location.pathname.replace(/index\.html$/i, '');
          if (!rootPath.endsWith('/')) rootPath += '/';
          window.location.replace(rootPath + '?role=cliente' + window.location.hash);
          return;
        }
        if (!role && (path.indexOf('/cliente/') !== -1 || path.indexOf('/client/') !== -1)) role = 'client';
        if (!role && path.indexOf('/delivery/') !== -1) role = 'delivery';
        window.__RAPIDINGO_ROLE = 'client';
        var manifest = './manifest.json';
        var icon = './icons/icon-192.png';
        var title = 'Rapidingo';
        var theme = '#e50914';

        if (role === 'client') {
          manifest = './manifest.json';
          icon = './icons/client-192.png';
          title = 'Rapidingo Cliente';
          theme = '#e50914';
        } else if (role === 'delivery') {
          manifest = './manifest.json';
          icon = './icons/delivery-192.png';
          title = 'Rapidingo Delivery';
          theme = '#e50914';
        }

        document.title = title;
        document.querySelector('meta[name="theme-color"]').setAttribute('content', theme);
        document.querySelector('meta[name="apple-mobile-web-app-title"]').setAttribute('content', title);
        document.getElementById('app-manifest').setAttribute('href', manifest);
        document.getElementById('apple-touch-icon').setAttribute('href', icon);
      })();
    </script>
